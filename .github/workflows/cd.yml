name: CD

on:
  workflow_run:
    workflows: [CI]
    branches: [main]
    types: [completed]

jobs:
  deploy:
    name: Deploy to VPS
    runs-on: ubuntu-latest
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: 159.65.155.72
          username: root
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            cd /opt/GateWA
            git pull origin main
            sed -i "s|API_MASTER_KEY=.*|API_MASTER_KEY=${{ secrets.API_MASTER_KEY }}|" deploy/.env.vps
            docker compose -f deploy/docker-compose.vps.yml --env-file deploy/.env.vps --project-directory . up -d --build
            docker image prune -f
